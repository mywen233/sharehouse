services:
  # 🟢 Backend Service (Spring Boot)
  - type: web
    name: sharehouse-backend
    runtime: java
    rootDir: sharehouse_v2/backend
    buildCommand: "gradle bootJar"
    startCommand: "java -jar build/libs/backend-0.0.1-SNAPSHOT.jar"

  # 🟢 Frontend Service (Static Site)
  - type: static
    name: sharehouse-frontend
    runtime: node
    rootDir: sharehouse_v2/frontend
    buildCommand: "npm install && npm run build"
    publishDir: "dist"
